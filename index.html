<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Webnovel Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            background-color: #07070a;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(225, 29, 72, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.06) 0%, transparent 40%);
            background-attachment: fixed;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Premium Frosted Glass */
        .glass-card {
            background: rgba(15, 15, 22, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.5);
        }
        
        .glass-card:active { transform: scale(0.98); transition: transform 0.1s; }
        
        .glass-nav {
            background: rgba(7, 7, 10, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-glow {
            background: linear-gradient(90deg, #ff1b6b, #ff4582);
            box-shadow: 0 0 12px rgba(255, 27, 107, 0.5);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Hide Scrollbars */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Animations */
        .slide-in { animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .slide-out { animation: slideOut 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }

        .modal-enter { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(12px); } }

        .toast-show { animation: popUp 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes popUp {
            0% { transform: translate(-50%, -20px) scale(0.9); opacity: 0; }
            10% { transform: translate(-50%, 20px) scale(1); opacity: 1; }
            90% { transform: translate(-50%, 20px) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -20px) scale(0.9); opacity: 0; }
        }

        .tab-scroll-mask {
            mask-image: linear-gradient(to right, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
        }
    </style>
</head>
<body class="h-screen flex flex-col selection:bg-[#ff1b6b]/30">

    <div id="main-screen" class="flex-1 flex flex-col h-full overflow-hidden relative z-0">
        
        <header class="px-6 pt-12 pb-4 flex justify-between items-end">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-[0.2em]" id="storage-mode-text">Local Library</p>
                    <i id="sync-icon" data-lucide="hard-drive" class="w-4 h-4 text-blue-400 transition-colors duration-500"></i>
                </div>
                <h1 class="text-4xl font-black tracking-tight gradient-text drop-shadow-md">My Novels</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="window.openAddModal()" class="w-10 h-10 bg-gradient-to-tr from-[#ff1b6b] to-[#e11d48] text-white rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(255,27,107,0.4)] active:scale-95 transition-transform">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
                <div class="bg-white/5 border border-white/10 px-3.5 py-2 rounded-2xl flex items-center gap-2">
                    <i data-lucide="book-open" class="w-3.5 h-3.5 text-gray-400"></i>
                    <span class="text-gray-300 text-sm font-bold" id="total-count">0</span>
                </div>
            </div>
        </header>

        <div class="px-6 mb-4">
            <div class="glass-card rounded-2xl p-1 flex items-center focus-within:border-[#ff1b6b]/50 focus-within:shadow-[0_0_20px_rgba(255,27,107,0.15)] transition-all">
                <div class="pl-4 pr-2"><i data-lucide="search" class="w-5 h-5 text-gray-500"></i></div>
                <input type="text" id="search-input" placeholder="Search your library..." class="bg-transparent border-none text-[15px] text-white w-full py-3 focus:outline-none placeholder-gray-600 font-medium">
                <button id="clear-search" class="hidden pr-4 text-gray-500 hover:text-white transition-colors" onclick="window.clearSearch()">
                    <i data-lucide="x-circle" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="pl-6 mb-2 overflow-x-auto tab-scroll-mask">
            <div class="flex gap-3 pb-2 w-max pr-6">
                <button id="tab-recent" onclick="window.switchTab('recent')" class="px-5 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 transition-all bg-gradient-to-r from-[#ff1b6b] to-[#e11d48] text-white shadow-[0_4px_20px_rgba(225,29,72,0.4)]">
                    <i data-lucide="clock" class="w-4 h-4 fill-current"></i> Reading
                    <span class="bg-white/20 px-2 py-0.5 rounded-full text-[10px] text-white" id="recent-badge">0</span>
                </button>
                <button id="tab-bookmark" onclick="window.switchTab('bookmark')" class="px-5 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 transition-all bg-white/5 border border-white/5 text-gray-400 hover:bg-white/10">
                    <i data-lucide="bookmark" class="w-4 h-4"></i> Bookmark
                    <span class="bg-black/50 px-2 py-0.5 rounded-full text-[10px] text-gray-400" id="bookmark-badge">0</span>
                </button>
                <button id="tab-completed" onclick="window.switchTab('completed')" class="px-5 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 transition-all bg-white/5 border border-white/5 text-gray-400 hover:bg-white/10">
                    <i data-lucide="check-circle-2" class="w-4 h-4"></i> Completed
                    <span class="bg-black/50 px-2 py-0.5 rounded-full text-[10px] text-gray-400" id="completed-badge">0</span>
                </button>
                <button id="tab-dropped" onclick="window.switchTab('dropped')" class="px-5 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 transition-all bg-white/5 border border-white/5 text-gray-400 hover:bg-white/10">
                    <i data-lucide="x-octagon" class="w-4 h-4"></i> Dropped
                    <span class="bg-black/50 px-2 py-0.5 rounded-full text-[10px] text-gray-400" id="dropped-badge">0</span>
                </button>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto px-6 pb-32 pt-2 space-y-3.5 relative" id="novel-list">
            <div id="loading-state" class="absolute inset-0 flex flex-col items-center justify-center pt-20">
                <i data-lucide="loader-2" class="w-10 h-10 text-[#ff1b6b] animate-spin mb-4"></i>
                <p class="text-sm font-bold text-gray-500 uppercase tracking-widest">Waking Up Database</p>
            </div>
        </main>

        <div class="fixed bottom-0 w-full z-40 hidden" id="cr-bar-container">
            <div class="glass-nav flex items-center p-3 px-5 gap-4 shadow-[0_-10px_40px_rgba(0,0,0,0.8)] pb-safe cursor-pointer hover:bg-[#13131c] transition-colors" onclick="window.openCurrentlyReading()">
                <div id="cr-cover-box" class="w-12 h-12 rounded-xl overflow-hidden relative shadow-lg shadow-black/50 border border-white/10 bg-slate-800">
                     </div>
                <div class="flex-1 overflow-hidden">
                    <h4 id="cr-title" class="text-sm font-bold text-white truncate tracking-wide">Select a Novel</h4>
                    <p id="cr-status" class="text-[11px] text-[#ff1b6b] font-bold uppercase tracking-widest mt-0.5 truncate">Resume Reading</p>
                </div>
                <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-black hover:scale-105 active:scale-95 transition-transform shadow-[0_0_15px_rgba(255,255,255,0.2)] pointer-events-none">
                    <i data-lucide="play" class="w-4 h-4 ml-0.5 fill-current"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="details-screen" class="fixed inset-0 z-50 bg-[#07070a] hidden flex-col h-full w-full transform translate-x-full">
        
        <div class="absolute top-0 left-0 w-full h-96 opacity-30 transform scale-110 pointer-events-none" style="filter: blur(40px);">
            <div id="details-bg" class="w-full h-full bg-cover bg-center transition-all duration-300"></div>
        </div>
        <div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-transparent via-[#07070a]/90 to-[#07070a] pointer-events-none"></div>

        <div class="relative z-10 flex items-center justify-between px-5 pt-12 pb-2">
            <button onclick="window.closeDetails()" class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-white active:scale-90 transition-all">
                <i data-lucide="chevron-down" class="w-6 h-6 rotate-90"></i>
            </button>
            <h2 class="flex-1 text-center font-bold text-[10px] uppercase tracking-[0.2em] text-gray-400 truncate px-4">Novel Status</h2>
            <button onclick="window.promptDeleteCurrent()" class="w-10 h-10 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center text-red-400 hover:bg-red-500/30 active:scale-90 transition-all shadow-[0_0_15px_rgba(239,68,68,0.1)]">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </div>

        <main class="relative z-10 flex-1 overflow-y-auto px-6 pb-12">
            <div class="flex flex-col items-center mt-2 mb-6 text-center">
                <div id="details-cover-box" class="w-36 h-52 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] overflow-hidden border border-white/10 relative mb-5 transition-all duration-300">
                    </div>
                <h2 class="text-2xl font-black text-white leading-tight mb-2 px-2 drop-shadow-md" id="details-title">Novel Title</h2>
                <div class="inline-flex items-center gap-2 text-xs font-bold bg-white/5 border border-white/10 px-4 py-1.5 rounded-full text-gray-300">
                    <i data-lucide="layers" class="w-3.5 h-3.5 text-[#ff1b6b]"></i>
                    <span id="details-total">0 Chapters</span>
                </div>
            </div>

            <div class="flex gap-2 bg-black/40 border border-white/5 p-1.5 rounded-2xl mb-6 shadow-inner">
                <button onclick="window.changeNovelStatus('recent')" id="det-stat-recent" class="flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-xl transition-all text-gray-400 hover:text-white">Reading</button>
                <button onclick="window.changeNovelStatus('bookmark')" id="det-stat-bookmark" class="flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-xl transition-all text-gray-400 hover:text-white">Bookmark</button>
                <button onclick="window.changeNovelStatus('completed')" id="det-stat-completed" class="flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-xl transition-all text-gray-400 hover:text-white">Done</button>
                <button onclick="window.changeNovelStatus('dropped')" id="det-stat-dropped" class="flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-xl transition-all text-gray-400 hover:text-white">Drop</button>
            </div>

            <div class="glass-card rounded-3xl p-5 mb-8 border-white/10 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#ff1b6b] to-transparent opacity-50"></div>
                
                <h3 class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.15em] flex items-center gap-1.5 mb-4">
                    <i data-lucide="target" class="w-3.5 h-3.5 text-[#ff1b6b]"></i> Update Progress
                </h3>
                
                <div class="flex gap-3 mb-4 h-16">
                    <div class="relative flex-1 h-full bg-black/50 border border-white/5 rounded-2xl focus-within:border-[#ff1b6b]/50 focus-within:bg-black/80 transition-colors flex items-center px-4 shadow-inner">
                        <i data-lucide="book-open" class="w-5 h-5 text-gray-500"></i>
                        <input type="number" id="details-input" class="w-full bg-transparent border-none text-center text-white text-3xl font-black outline-none placeholder-gray-700" placeholder="0">
                    </div>
                    <button onclick="window.saveProgress()" class="h-full px-6 bg-gradient-to-br from-[#ff1b6b] to-[#e11d48] text-white rounded-2xl font-bold shadow-[0_5px_20px_rgba(225,29,72,0.4)] active:scale-95 transition-all flex items-center justify-center">
                        <i data-lucide="check" class="w-7 h-7"></i>
                    </button>
                </div>

                <div class="flex gap-2">
                    <button onclick="window.addChapter(1)" class="flex-1 py-3.5 rounded-xl bg-white/5 border border-white/5 font-black text-sm active:scale-95 transition-all text-gray-200 shadow-sm hover:bg-white/10">+1</button>
                    <button onclick="window.addChapter(5)" class="flex-1 py-3.5 rounded-xl bg-white/5 border border-white/5 font-black text-sm active:scale-95 transition-all text-gray-200 shadow-sm hover:bg-white/10">+5</button>
                    <button onclick="window.addChapter(10)" class="flex-1 py-3.5 rounded-xl bg-[#ff1b6b]/10 border border-[#ff1b6b]/20 font-black text-sm active:scale-95 transition-all text-[#ff1b6b] shadow-[0_0_15px_rgba(255,27,107,0.1)] hover:bg-[#ff1b6b]/20">+10</button>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-5 mb-8 border-indigo-500/10 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-30"></div>
                <h3 class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.15em] flex items-center gap-1.5 mb-4">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5 text-indigo-400"></i> AI Companion
                </h3>
                
                <div class="flex gap-3 mb-4">
                    <button onclick="window.recommendSimilar()" class="flex-1 py-3 rounded-xl bg-indigo-500/10 border border-indigo-500/20 font-bold text-xs active:scale-95 transition-all text-indigo-300 shadow-[0_0_15px_rgba(99,102,241,0.1)] hover:bg-indigo-500/20 flex flex-col items-center gap-1.5">
                        <span class="text-lg">✨</span> Similar Novels
                    </button>
                    <button onclick="window.summarizePremise()" class="flex-1 py-3 rounded-xl bg-purple-500/10 border border-purple-500/20 font-bold text-xs active:scale-95 transition-all text-purple-300 shadow-[0_0_15px_rgba(168,85,247,0.1)] hover:bg-purple-500/20 flex flex-col items-center gap-1.5">
                        <span class="text-lg">✨</span> Story Premise
                    </button>
                </div>

                <div id="ai-response-box" class="hidden bg-black/40 border border-white/5 rounded-2xl p-4 text-sm text-gray-300 leading-relaxed">
                    </div>
            </div>

            <div>
                <h3 class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.15em] mb-5 ml-1 flex items-center gap-1.5">
                    <i data-lucide="activity" class="w-3.5 h-3.5"></i> History Log
                </h3>
                <div id="details-timeline" class="pl-2 space-y-0 relative border-l-2 border-gray-800 ml-2 pb-6">
                    </div>
            </div>
        </main>
    </div>

    <div id="add-modal" class="fixed inset-0 z-[200] bg-black/80 hidden items-center justify-center opacity-0 transition-all duration-200 backdrop-blur-sm">
        <div class="glass-card w-[90%] max-w-[380px] rounded-[24px] p-6 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="window.closeAddModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            
            <h2 class="text-xl font-black text-white mb-1">Add Novel</h2>
            <p class="text-xs text-gray-400 font-medium mb-5">Expand your library.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">Title <span class="text-[#ff1b6b]">*</span></label>
                    <input type="text" id="add-title" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 mt-1 text-sm text-white font-bold focus:border-[#ff1b6b] focus:outline-none transition-colors shadow-inner" placeholder="e.g. Shadow Slave">
                </div>
                
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">Total Ch</label>
                        <input type="number" id="add-tot" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 mt-1 text-sm text-white font-bold focus:border-[#ff1b6b] focus:outline-none transition-colors shadow-inner" placeholder="0 = Ongoing">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">Current Ch</label>
                        <input type="number" id="add-cur" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 mt-1 text-sm text-white font-bold focus:border-[#ff1b6b] focus:outline-none transition-colors shadow-inner" placeholder="0">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">Cover Image URL</label>
                    <input type="text" id="add-cover" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 mt-1 text-sm text-white font-bold focus:border-[#ff1b6b] focus:outline-none transition-colors shadow-inner" placeholder="(Optional) https://...">
                </div>

                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1 mb-2 block">Status Category</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="sel-recent" onclick="window.selectAddTab('recent')" class="py-2.5 text-xs font-bold rounded-xl bg-[#ff1b6b] text-white shadow-[0_2px_10px_rgba(255,27,107,0.3)] transition-all uppercase tracking-wide">Reading</button>
                        <button id="sel-bookmark" onclick="window.selectAddTab('bookmark')" class="py-2.5 text-xs font-bold rounded-xl bg-black/40 border border-white/10 text-gray-400 hover:text-white transition-all uppercase tracking-wide">Bookmark</button>
                        <button id="sel-completed" onclick="window.selectAddTab('completed')" class="py-2.5 text-xs font-bold rounded-xl bg-black/40 border border-white/10 text-gray-400 hover:text-white transition-all uppercase tracking-wide">Done</button>
                        <button id="sel-dropped" onclick="window.selectAddTab('dropped')" class="py-2.5 text-xs font-bold rounded-xl bg-black/40 border border-white/10 text-gray-400 hover:text-white transition-all uppercase tracking-wide">Drop</button>
                    </div>
                </div>

                <button onclick="window.submitAddNovel()" class="w-full mt-4 bg-gradient-to-r from-[#ff1b6b] to-[#e11d48] text-white font-bold py-3.5 rounded-xl shadow-[0_4px_15px_rgba(225,29,72,0.4)] active:scale-95 transition-transform">
                    Save to Library
                </button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="fixed inset-0 z-[250] bg-black/80 hidden items-center justify-center opacity-0 transition-all duration-200 backdrop-blur-sm">
        <div class="glass-card w-[85%] max-w-sm rounded-[24px] p-6 shadow-2xl text-center" onclick="event.stopPropagation()">
            <div class="w-14 h-14 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20 shadow-[0_0_20px_rgba(239,68,68,0.2)]">
                <i data-lucide="trash-2" class="w-7 h-7"></i>
            </div>
            <h2 class="text-xl font-black text-white mb-2">Remove Novel?</h2>
            <p class="text-sm text-gray-400 mb-6 leading-relaxed">Are you sure you want to permanently delete <span id="del-modal-title" class="text-white font-bold"></span> from your library?</p>
            
            <div class="flex gap-3">
                <button onclick="window.closeDeleteModal()" class="flex-1 py-3.5 rounded-xl bg-white/5 font-bold text-sm text-gray-300 hover:bg-white/10 transition-colors">Cancel</button>
                <button id="confirm-del-btn" class="flex-1 py-3.5 rounded-xl bg-red-500 font-bold text-sm text-white shadow-[0_0_15px_rgba(239,68,68,0.4)] active:scale-95 transition-all">Remove</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[300] bg-[#1a1a24] border border-[#ff1b6b]/40 text-white px-5 py-3.5 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.9)] flex items-center gap-3 font-bold text-sm opacity-0 hidden pointer-events-none w-max">
        <div class="bg-[#ff1b6b]/20 rounded-full p-1"><i data-lucide="check-circle-2" class="w-4 h-4 text-[#ff1b6b]"></i></div>
        <span id="toast-msg">Success</span>
    </div>

    <script>
        // GLOBALS
        window.appState = { novels: {}, lastRead: "" };
        window.currentTab = 'recent';
        window.currentlyEditingId = null;
        window.addTabSelection = 'recent';
        // Bumped Storage Key to completely wipe broken empty states
        const STORAGE_KEY = 'webnovel_tracker_v_offline_final_v5';

        // UTILS
        window.getNovelId = (title) => encodeURIComponent(title.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase());
        
        window.getInitials = (title) => {
            let words = title.replace(/[^a-zA-Z\s]/g, '').trim().split(' ');
            if (words.length === 1 && words[0].length > 1) return words[0].substring(0, 2).toUpperCase();
            if (words.length > 1) return (words[0][0] + words[words.length-1][0]).toUpperCase();
            return 'N';
        };

        window.getColorClass = (title) => {
            const bgCols = ['bg-red-900', 'bg-blue-900', 'bg-emerald-900', 'bg-purple-900', 'bg-orange-900', 'bg-teal-900', 'bg-indigo-900', 'bg-rose-900', 'bg-cyan-900', 'bg-fuchsia-900'];
            let hash = 0;
            for (let i = 0; i < title.length; i++) hash = title.charCodeAt(i) + ((hash << 5) - hash);
            return bgCols[Math.abs(hash) % bgCols.length];
        };

        window.showToast = function(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;

            void toast.offsetWidth; 
            toast.classList.add('toast-show');
        };

        // ================= DYNAMIC FIREBASE / LOCAL ENGINE =================
        const isLocalFile = window.location.protocol === 'file:' || window.location.protocol === 'content:';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        async function startApp() {
            if (!isLocalFile && Object.keys(firebaseConfig).length > 0) {
                try {
                    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                    const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                    const { getFirestore, doc, setDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                    
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    let firebaseUser = null;

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (u) => {
                        firebaseUser = u;
                        if (firebaseUser) {
                            const docRef = doc(db, 'artifacts', appId, 'users', firebaseUser.uid, 'library', 'data_v9');
                            onSnapshot(docRef, (docSnap) => {
                                document.getElementById('loading-state').classList.add('hidden');
                                document.getElementById('sync-icon').classList.add('text-green-400');
                                document.getElementById('sync-icon').setAttribute('data-lucide', 'cloud-check');
                                document.getElementById('storage-mode-text').innerText = "Cloud Library";
                                lucide.createIcons();

                                if (docSnap.exists()) {
                                    const data = docSnap.data();
                                    if (data && data.novels && Object.keys(data.novels).length > 0) {
                                        window.appState = data;
                                    } else {
                                        window.loadDefaultLibrary(); 
                                        window.saveToCloud();
                                    }
                                } else {
                                    window.loadDefaultLibrary(); 
                                    window.saveToCloud();
                                }
                                window.updateUI();
                            }, (err) => { console.error("Firebase Error:", err); fallbackToMemory(); });
                        }
                    });

                    window.saveToCloud = function() {
                        if (!firebaseUser) return;
                        const icon = document.getElementById('sync-icon');
                        icon.classList.add('animate-pulse', 'text-yellow-400');
                        icon.setAttribute('data-lucide', 'cloud-upload');
                        lucide.createIcons();

                        const docRef = doc(db, 'artifacts', appId, 'users', firebaseUser.uid, 'library', 'data_v9');
                        setDoc(docRef, window.appState).then(() => {
                            icon.classList.remove('animate-pulse', 'text-yellow-400');
                            icon.classList.add('text-green-400');
                            icon.setAttribute('data-lucide', 'cloud-check');
                            lucide.createIcons();
                        }).catch(e => { console.error("Save error", e); window.saveStorageLocal(); });
                    };
                    
                    return; 
                } catch (e) {
                    console.warn("Module load blocked. Running entirely offline.");
                }
            }
            
            // Bypass to offline memory
            fallbackToMemory();
        }

        function fallbackToMemory() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('sync-icon').setAttribute('data-lucide', 'hard-drive');
            document.getElementById('sync-icon').classList.add('text-blue-400');
            document.getElementById('storage-mode-text').innerText = "Local Library";
            lucide.createIcons();
            
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                let loadedValidData = false;
                
                if(data) {
                    const parsed = JSON.parse(data);
                    if (parsed && parsed.novels && Object.keys(parsed.novels).length > 0) {
                        window.appState = parsed;
                        loadedValidData = true;
                    }
                }
                
                if (!loadedValidData) {
                    window.loadDefaultLibrary();
                    window.saveStorageLocal();
                }
            } catch(e) {
                console.warn("localStorage restricted. Using RAM only.");
                window.appState = { novels: {}, lastRead: "" };
                window.loadDefaultLibrary();
            }
            
            window.updateUI();
            
            window.saveToCloud = function() {
                window.saveStorageLocal();
                const icon = document.getElementById('sync-icon');
                icon.classList.add('animate-pulse', 'text-blue-300');
                setTimeout(() => icon.classList.remove('animate-pulse', 'text-blue-300'), 500);

        // ================= GEMINI AI COMPANION =================
        const apiKey = ""; // Insert Key here if needed

        async function fetchWithBackoff(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function callGemini(prompt) {
            if(!apiKey) return "API Key missing! The Oracle is asleep.";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "You are a webnovel assistant. Keep answers brief, formatted simply, and focused on the requested webnovel." }] }
            };
            try {
                const result = await fetchWithBackoff(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
            } catch (error) {
                console.error("Gemini API Error:", error);
                return "The Oracle's connection failed. Please try again later.";
            }
        }
